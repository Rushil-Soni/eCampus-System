<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Elective Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- <link rel="stylesheet" th:href="@{/css/styleSrs.css}"> -->
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
</head>

<body>
<!-- HEADER -->
<div th:replace="fragments/header :: header"></div>

<!-- NAVBAR -->
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container-lg my-5">
<h2 class="mb-4">Course Offerings by Slot</h2>

    <form id="registrationForm" th:action="@{/student/submitPreference}" method="post">
    
        <div th:each="entry : ${slotMap}" class="slot-container mb-5" th:data-slot-id="${entry.key}">
            <div class="alert alert-info d-flex justify-content-between">
                <h4 th:text="'Slot: ' + ${entry.key}">Slot 1</h4>
                <span class="text-muted small">Fill all or none</span>
            </div>

            <table class="table table-bordered">
                <thead class="table-light">
                    <tr>
                        <th>Course</th>
                        <th>L-T-P-C</th>
                        <th>Type</th>
                        <th style="width: 200px;">Preference</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="course : ${entry.value}" class="course-row">
                        <td th:text="${course[2]}">Course Name</td>
                        <td th:text="${course[4]}">3-0-0-3</td>
                        <td th:text="${course[6]}">TE</td>
                        <td>
                            <select th:name="'pref_' + ${entry.key} + '_' + ${course[0]}" 
                                    class="form-select pref-dropdown" 
                                    th:data-slot="${entry.key}"
                                    th:data-total="${entry.value.size()}">
                                <option value="">-- No Preference --</option>
                                </select>
                        </td>
                    </tr>
                </tbody>
            </table>
            
            <div class="row align-items-center bg-light p-2 mx-0 border">
                <div class="col-md-8">Assign priority to this Slot relative to others:</div>
                <div class="col-md-4">
                    <select th:name="'slotPriority_' + ${entry.key}" class="form-select slot-priority-select">
                        <option value="">-- Select Slot Priority --</option>
                        <option th:each="i : ${#numbers.sequence(1, slotMap.size())}" 
                                th:value="${i}" th:text="${i}"></option>
                    </select>
                </div>
            </div>
        </div>

        <div class="card mb-5 border-primary">
            <div class="card-header bg-primary text-white">How many courses of each type do you require?</div>
            <div class="card-body">
                <div class="row">
                    <div th:each="type : ${electiveTypes}" class="col-md-3 mb-3">
                        <label class="form-label" th:text="${type}">ICTE</label>
                        <input type="number" th:name="'count_' + ${type}" class="form-control" min="0" value="0">
                    </div>
                </div>
            </div>
        </div>

        <button type="button" onclick="validateAndSubmit()" class="btn btn-success btn-lg w-100 mb-5">Submit All Preferences</button>
    </form>
</div>

<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function() {
        // 1. Initialize dropdown options based on number of courses in slot
        document.querySelectorAll('.pref-dropdown').forEach(select => {
            const total = parseInt(select.dataset.total);
            for (let i = 1; i <= total; i++) {
                let opt = document.createElement('option');
                opt.value = i;
                opt.text = i;
                select.add(opt);
            }
        });

        // 2. Dynamic Filtering: Remove selected numbers from other dropdowns in the SAME slot
        document.addEventListener('change', function(e) {
            if (e.target.classList.contains('pref-dropdown')) {
                const slotId = e.target.dataset.slot;
                const currentSlotDropdowns = document.querySelectorAll(`.pref-dropdown[data-slot="${slotId}"]`);
                
                // Get all currently selected values in this slot
                const selectedValues = Array.from(currentSlotDropdowns)
                                        .map(s => s.value)
                                        .filter(v => v !== "");

                currentSlotDropdowns.forEach(select => {
                    const currentVal = select.value;
                    Array.from(select.options).forEach(opt => {
                        if (opt.value === "") return;
                        // Disable if selected elsewhere, but keep enabled if it's the current selection
                        opt.disabled = selectedValues.includes(opt.value) && opt.value !== currentVal;
                    });
                });
            }
        });

        document.addEventListener('change', function(e) {
            // Logic for Slot Priorities (Global across all tables)
            if (e.target.classList.contains('slot-priority-select')) {
                const allPrioritySelects = document.querySelectorAll('.slot-priority-select');
                
                // Get all currently selected priorities
                const selectedPriorities = Array.from(allPrioritySelects)
                                                .map(s => s.value)
                                                .filter(v => v !== "");

                allPrioritySelects.forEach(select => {
                    const currentVal = select.value;
                    Array.from(select.options).forEach(opt => {
                        if (opt.value === "") return;
                        // Disable if this priority is already taken by another slot
                        opt.disabled = selectedPriorities.includes(opt.value) && opt.value !== currentVal;
                    });
                });
            }
        });
    });

    function validateAndSubmit() {
        const form = document.getElementById('registrationForm');
        const slots = document.querySelectorAll('.slot-container');
        const priorityValues = [];
        let isValid = true;

        slots.forEach(slot => {
            const slotId = slot.dataset.slotId;
            const dropdowns = Array.from(slot.querySelectorAll('.pref-dropdown'));
            const filledCount = dropdowns.filter(d => d.value !== "").length;
            const priorityEl = document.querySelector(`[name="slotPriority_${slotId}"]`);
            
            if (filledCount > 0) {
                // Check 1: All courses in slot must have preference
                if (filledCount < dropdowns.length) {
                    alert(`In Slot ${slotId}, you must provide preferences for ALL courses.`);
                    isValid = false;
                }
                // Check 2: Priority must be selected for this slot
                if (!priorityEl.value) {
                    alert(`Please assign a unique priority rank for Slot ${slotId}.`);
                    isValid = false;
                }
                // Check 3: Duplicate priority check (extra safety)
                if (priorityValues.includes(priorityEl.value)) {
                    alert(`Priority ${priorityEl.value} is assigned to more than one slot!`);
                    isValid = false;
                }
                priorityValues.push(priorityEl.value);
            }
        });

        if (isValid) form.submit();
    }
</script>

<!-- FOOTER -->
<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
