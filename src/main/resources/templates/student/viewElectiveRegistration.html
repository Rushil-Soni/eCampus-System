<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>View Elective Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- <link rel="stylesheet" th:href="@{/css/styleSrs.css}"> -->
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
</head>

<body>
<!-- HEADER -->
<div th:replace="fragments/header :: header"></div>

<!-- NAVBAR -->
<div th:replace="fragments/navbar :: navbar"></div>

<h1>Elective Registration Details</h1>

    <!-- ================= COURSE PREFERENCES ================= -->
    <div th:each="entry : ${groupedCoursePref}" class="container my-4">
        <h2 th:text="'Slot ' + ${entry.key}"></h2>
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th style="width: 15%">Preference Rank</th>
                        <th style="width: 20%">Course Code</th>
                        <th style="width: 40%">Course Name</th>
                        <th style="width: 25%">L-T-P-C</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="cp : ${entry.value}">
                        <td th:text="${cp.prefIndex}">1</td>
                        <td th:text="${cp.termCourse.course.crscode}">MATH101</td>
                        <td th:text="${cp.termCourse.course.crsname}">Mathematics</td>
                        <td th:text="|${cp.termCourse.course.crslectures}-${cp.termCourse.course.crstutorials}-${cp.termCourse.course.crspracticals}-${cp.termCourse.course.crscreditpoints}|">
                            3-0-2-4
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- ================= SLOT PRIORITIES ================= -->
    <div class="container">
        <h2>Slot Priorities</h2>

        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>Slot</th>
                        <th>Priority</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="sp : ${slotPref}">
                        <td th:text="${sp[0]}"></td> <!-- slot -->
                        <td th:text="${sp[1]}"></td> <!-- pref_index -->
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- ================= ELECTIVE REQUIREMENTS ================= -->
    <div class="container">
        <h2>Elective Requirements</h2>

        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>Elective Type</th>
                        <th>Required Count</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="req : ${requirements}">
                        <td th:text="${req[0]}"></td> <!-- elect_type -->
                        <td th:text="${req[1]}"></td> <!-- count -->
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

<!-- FOOTER -->
<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
