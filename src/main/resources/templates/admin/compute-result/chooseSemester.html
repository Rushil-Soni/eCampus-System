<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Choose Semester For Result Computation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <style>
        /* Ensures the card sits in the middle of the viewport height */
        .main-container {
            min-height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .download-card {
            width: 100%;
            max-width: 500px;
        }
    </style>
</head>


<body>

<!-- HEADER -->
<div th:replace="fragments/header :: header"></div>

<!-- NAVBAR -->
<div th:replace="fragments/navbar :: navbar"></div>

    
    <div class="container main-container">
        <div class="card shadow-lg download-card">
            <div class="card-header bg-primary text-white text-center">
                <h4 class="mb-0">Compute Result</h4>
            </div>
            <div class="card-body p-4">

                <form th:action="@{/admin/computeResult/process}" method="post">
                    <div class="mb-4">
                        <label class="form-label fw-bold">Select Semester</label>
                        <select name="semesterId" class="form-select form-select-lg" required>
                            <option value="">-- Select Semester --</option>
                            <option th:each="sem : ${semesters}" 
                                    th:value="${sem.strid}" 
                                    th:text="${sem.strname}">
                            </option>
                        </select>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="bi bi-gear-fill"></i> Compute Result
                        </button>
                    </div>
                </form>

                <div th:if="${success}" class="alert alert-success">
                    <span th:text="${success}"></span>
                </div>

            </div>
        </div>
    </div>

    <div th:replace="fragments/footer :: footer"></div>
</body>
</html>
